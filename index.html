<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farzad Davatgar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --border: #222222;
      --text: #e8e4dc;
      --muted: #6a6660;
      --accent: #c9b99a;
      --hover: #f0ebe2;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 460px;
      width: 100%;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Profile image */
    .avatar-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 2rem;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -3px;
      border: 1px solid var(--border);
      border-radius: 14px;
      pointer-events: none;
    }

    .avatar {
      width: 88px;
      height: 88px;
      object-fit: cover;
      display: block;
      filter: grayscale(20%);
      border-radius: 10px;
    }

    /* Placeholder avatar (shown when no image is set) */
    .avatar-placeholder {
      width: 88px;
      height: 88px;
      background: var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.5;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 0.4rem;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .link::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--accent);
      opacity: 0.07;
      transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .link:hover::before { width: 100%; }
    .link:hover {
      border-color: var(--accent);
      color: var(--hover);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .link-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .link:hover .link-icon { opacity: 1; }

    .arrow {
      font-size: 0.75rem;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link:hover .arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
    }

    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.8rem; }
      .name { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- PROFILE PICTURE -->
    <!-- To use your own photo:
         Replace the avatar-placeholder div below with:
         <img class="avatar" src="your-photo.jpg" alt="Farzad Davatgar" />
         Then remove the avatar-placeholder div. -->
    <div class="avatar-wrap">
      <div class="avatar-placeholder">Your<br>Photo</div>
    </div>

    <h1 class="name">Farzad Davatgar</h1>
    <p class="tagline"><!-- Your title / short bio here --></p>

    <div class="divider"></div>

    <div class="links">

      <!-- LINKEDIN -->
      <a class="link" href="https://www.linkedin.com/in/davatgar/" target="_blank" rel="noopener">
        <span class="link-left">
          <svg class="link-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          LinkedIn
        </span>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="footer">davatgar.com</p>
  </div>
</body>
</html>
